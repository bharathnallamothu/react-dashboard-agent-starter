name: Publish verified starter

on:
  push:
    paths:
      - '.github/workflows/publish-starter.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Reconstruct verified starter
        shell: bash
        run: |
          cat starter.part1.b64 starter.part2.b64 | base64 --decode > /tmp/starter.zip
          unzip -oq /tmp/starter.zip
          rm -f starter.part1.b64 starter.part2.b64
          rm -f .github/workflows/publish-starter.yml
          rmdir --ignore-fail-on-non-empty .github/workflows .github
      - name: Publish starter files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish React dashboard agent starter"
          git push origin HEAD:main
